services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: warehouse_user
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "psql -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
    - postgres:/postgres
    networks:
      - warehouse_net
  backend:
    build:
      context: ./app
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:1234@postgres:5432/warehouse_user
      JWT_SECRET: your_jwt_secret_key
      AI_API_KEY: your_ai_api_key
      AI_SERVICE: openai
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend:/backend
    networks:
      - warehouse_net
    develop:
      watch:
        - path: ./app
          action: rebuild
          target: /app
        - path: ./app/Dockerfile
          action: rebuild

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      REACT_APP_API_URL: http://backend:3000
      REACT_APP_WS_URL: ws://backend:3000
    ports:
      - "8000:8000"
    depends_on:
      - backend
    volumes:
      - frontend:/frontend
    networks:
      - warehouse_net
    develop:
      watch:
        - path: ./frontend/*
          action: rebuild
          target: /frontend
        - path: ./frontend/Dockerfile
          action: rebuild

volumes:
  frontend:
  backend:
  postgres:

networks:
  warehouse_net:
    driver: bridge
    name: warehouse_net